<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAFBFC" />
    <title>GeoCompanion.ai Pitch Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: '#121212',
              hull: '#FFFFFF',
              clay: '#B35C37',
              sage: '#7D8471',
              void: '#FBFBFB',
              stardust: '#525252',
            },
            boxShadow: {
              brutalist: '4px 4px 0px 0px rgba(18, 18, 18, 1)',
              elevation: '0 4px 24px rgba(0, 0, 0, 0.04)'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #FBFBFB;
      }

      body {
        font-family: 'Inter', sans-serif;
        color: #121212;
        overflow-x: hidden;
      }

      .grain-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.05;
        z-index: 9999;
        background-image: var(--noise);
      }

      .structured-chaos-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 1.5rem;
      }

      .brutalist-border {
        border: 2px solid #121212;
      }

      .label-stamp {
        padding: 0.25rem 0.5rem;
        background: #121212;
        color: #FBFBFB;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="grain-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
